title: "About Me"
paragraph1: "I am Omid, a dedicated software engineer with a distinct focus on DevOps. My passion for technology began early, leading to hands-on exploration of operating systems and system architectures. I hold a Bachelor's degree in Information Technology and am currently advancing my expertise through a Master's degree in Data Science. This strong educational foundation continuously shapes my professional trajectory."
paragraph2: "I thrive in challenging environments, excelling at analyzing complex problems to architect efficient, scalable solutions. My primary interest lies within DevOps—bridging the gap between development and operations to optimize workflows and ensure robust, automated deployments. By combining my software engineering background with core DevOps principles, I am committed to building resilient and high-performing systems. ✨"
